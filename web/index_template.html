<!doctype html>
<html lang="en-us">
<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

	<title>Bestagon</title>
	<meta name="title" content="Bestagon">
	<meta name="description" content="Bestagon running in the browser">
	<meta name="viewport" content="width=device-width">

	<style>
		body {
			margin: 0px;
			overflow: hidden;
			background-color: black;
		}
		canvas.game_canvas {
			border: 0px none;
			background-color: black;
			padding-left: 0;
			padding-right: 0;
			margin-left: auto;
			margin-right: auto;
			display: block;
		}
	</style>
</head>
<body>
	<canvas class="game_canvas" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1" onmousedown="event.target.focus()" onkeydown="event.preventDefault()"></canvas>
	<script type="text/javascript" src="odin.js"></script>
	<script>
		var odinMemoryInterface = new odin.WasmMemoryInterface();
		odinMemoryInterface.setIntSize(4);
		var odinImports = odin.setupDefaultImports(odinMemoryInterface);

		// The Module is used as configuration for emscripten.
		var Module = {
			// This is called by emscripten when it starts up.
			instantiateWasm: (imports, successCallback) => {
				const newImports = {
					...odinImports,
					...imports
				}

				return WebAssembly.instantiateStreaming(fetch("index.wasm"), newImports).then(function(output) {
					var e = output.instance.exports;
					odinMemoryInterface.setExports(e);
					odinMemoryInterface.setMemory(e.memory);
					return successCallback(output.instance);
				});
			},
			// This happens a bit after `instantiateWasm`, when everything is
			// done setting up. At that point we can run code.
			onRuntimeInitialized: () => {
				var e = wasmExports;

				// Calls any procedure marked with @init
				e._start();

				// See src/web.odin for main_start, main_update and main_end.
				e.main_start();

				// Size the canvas to fill the window at the device's resolution 
                // CSS size = window size, backing store = window * devicePixelRatio. 
                // Feeding the physical size to raylib allows for the native
				// letterbox scaling (calculate_viewport + DrawTexturePro)
				function send_resize() {
					var canvas = document.getElementById('canvas');
					var dpr = window.devicePixelRatio || 1;
					var cssW = window.innerWidth;
					var cssH = window.innerHeight;
					// web_window_size_changed calls rl.SetWindowSize, which sets
					// the canvas backing store (and, via GLFW, the CSS size) to
					// the physical pixel size. 
                    // Re-assert the CSS size afterwards so the canvas displays 
                    // at the window size, not blown up to its backing size.
					e.web_window_size_changed(Math.round(cssW * dpr), Math.round(cssH * dpr));
					canvas.style.width = cssW + 'px';
					canvas.style.height = cssH + 'px';
				}

				window.addEventListener('resize', function(event) {
					send_resize();
				}, true);

				send_resize();

				// Runs the "main loop".
				function do_main_update() {
					if (!e.main_update()) {
						e.main_end();

						// Calls procedures marked with @fini
						e._end();
						return;
					}
					window.requestAnimationFrame(do_main_update);
				}

				window.requestAnimationFrame(do_main_update);
			},
			print: (function() {
				var element = document.getElementById("output");
				if (element) element.value = ''; // clear browser cache
				return function(text) {
					if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
					console.log(text);
					if (element) {
					  element.value += text + "\n";
					  element.scrollTop = element.scrollHeight; // focus on bottom
					}
				};
			})(),
			canvas: (function() {
				return document.getElementById("canvas");
			})()
		};
	</script>

	<!-- Emscripten injects its javascript here -->
	{{{ SCRIPT }}}
</body>
</html>
